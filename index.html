<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#1A1A18;font-family:"Inter",sans-serif;}
.tabbar{display:flex;align-items:center;height:48px;background:#1A1A18;border-bottom:3px solid #C8A96E;padding:0 20px;gap:4px;position:fixed;top:0;left:0;right:0;z-index:9999;}
.tabbar-logo{display:flex;align-items:center;gap:10px;margin-right:16px;}
.tabbar-logo-name{font-family:"Syne",sans-serif;font-weight:800;font-size:13px;color:#fff;letter-spacing:.06em;}
.tab-divider{width:1px;height:20px;background:rgba(255,255,255,.12);margin:0 6px;}
.tab{display:flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:7px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.5);font-family:"Inter",sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab:hover{background:rgba(255,255,255,.07);color:#fff;}
.tab.active{background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.3);color:#C8A96E;font-weight:600;}
.tab svg{opacity:.6;flex-shrink:0;}
.tab.active svg{opacity:1;}
.app-wrap{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;}
.app-frame{width:100%;height:calc(100% + 63px);margin-top:-63px;border:none;display:none;}
.app-frame.active{display:block;}
</style>
